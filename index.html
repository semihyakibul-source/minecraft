<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Web Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff;
            --secondary: #0066ff;
            --bg-dark: #050608;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 162, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        /* --- MODERN NAVBAR --- */
        nav {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        .logo-text { 
            font-size: 26px; 
            font-weight: 800; 
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        .logo-text span { color: var(--primary); }

        /* --- AUTH CARD --- */
        #auth-container {
            margin: auto;
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h2 { font-size: 32px; margin-bottom: 10px; font-weight: 800; }
        p { color: #888; margin-bottom: 30px; font-size: 15px; }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 162, 255, 0.4); }

        /* --- GAME SECTION --- */
        #game-container { display: none; padding: 60px 10%; text-align: center; }
        
        .main-chest {
            width: 240px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 40px rgba(0, 162, 255, 0.4));
        }
        .main-chest:hover { transform: scale(1.1) rotate(5deg); }

        /* --- ROULETTE --- */
        #roulette-section { display: none; margin-top: 50px; }
        .viewport {
            width: 100%;
            max-width: 800px;
            height: 160px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }
        .viewport::after {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px; background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            z-index: 10;
        }

        #strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; }
        .slot { min-width: 140px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .slot img { width: 80px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }

        /* --- MODAL --- */
        #win-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .win-card {
            background: rgba(255,255,255,0.05);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--primary);
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<nav>
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://minecraft.wiki/images/Anvil_JE3_BE2.png'">
        <div class="logo-text">AESIR<span>MC</span></div>
    </div>
    <div id="status-bar" style="font-size: 13px; font-weight: 600; color: #555;">DURUM: <span style="color: #00ff00;">AKTİF</span></div>
</nav>

<div id="auth-container">
    <h2>Giriş Yap</h2>
    <p>Hediyelerini almak için hesabını bağla.</p>
    
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="btn-primary" onclick="connectAndGo()">DÜNYAYA KATIL</button>
</div>

<div id="game-container">
    <h1 id="welcome-txt" style="font-weight: 800; font-size: 42px; margin-bottom: 40px;"></h1>
    
    <div id="chest-zone">
        <img src="https://minecraft.wiki/images/Chest_JE2_BE2.png" class="main-chest" onclick="initRoulette()">
        <p style="margin-top: 30px; color: var(--primary); font-weight: 600; letter-spacing: 2px; text-transform: uppercase;">Sandığı Açmak İçin Dokun</p>
    </div>

    <div id="roulette-section">
        <div class="viewport">
            <div id="strip"></div>
        </div>
        <button class="btn-primary" id="spin-btn" style="width: 240px; margin-top: 40px;" onclick="runRoulette()">KASAYI ÇEVİR</button>
    </div>
</div>

<div id="win-modal">
    <div class="win-card">
        <h3 style="color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 2px;">Başarım Kazanıldı!</h3>
        <h1 id="win-name" style="font-size: 42px; margin: 10px 0 30px 0;"></h1>
        <img id="win-img" src="" width="180">
        <div style="margin-top: 40px;">
            <button class="btn-primary" onclick="location.reload()">TEKRAR DENE</button>
        </div>
    </div>
</div>
