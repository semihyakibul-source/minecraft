<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Web Panel</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff;
            --secondary: #0066ff;
            --accent: #d48e00;
            --bg-dark: #050608;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 162, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        /* BİLDİRİM */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .toast {
            background: rgba(0, 255, 136, 0.1); backdrop-filter: blur(15px);
            border: 1px solid var(--success); color: white; padding: 16px 25px;
            border-radius: 16px; font-weight: 600; display: flex; align-items: center;
            gap: 12px; transform: translateX(120%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }

        /* SOL ALT BUTON */
        .fixed-play-container { position: fixed; bottom: 30px; left: 30px; z-index: 9999; }
        .btn-play {
            background-color: var(--accent); color: black; padding: 15px 35px;
            border-radius: 60px; font-weight: 800; font-size: 18px;
            display: flex; align-items: center; gap: 15px; border: none; cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); transition: 0.3s;
        }
        .btn-play:hover { transform: scale(1.05) translateY(-5px); }
        .custom-cursor-img { width: 45px; height: 45px; object-fit: contain; }

        nav { padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 6, 8, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }

        /* GİRİŞ PANELİ */
        #auth-container { margin: auto; width: 100%; max-width: 420px; padding: 50px; background: var(--glass); border: 1px solid var(--border); border-radius: 32px; text-align: center; }
        input { width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 16px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* KASA ALANI */
        #game-container { display: none; padding: 60px 10%; text-align: center; }
        .main-chest { width: 240px; cursor: pointer; filter: drop-shadow(0 0 40px rgba(0, 162, 255, 0.4)); }
        .chest-jump { animation: squash-stretch 0.5s ease-in-out; }
        @keyframes squash-stretch {
            0% { transform: scale(1); }
            30% { transform: scale(1.2, 0.8); }
            50% { transform: scale(0.8, 1.2) translateY(-30px); }
            100% { transform: scale(1); }
        }

        /* RULET SİSTEMİ */
        #roulette-section { display: none; margin-top: 50px; animation: fadeIn 0.5s; }
        .viewport {
            width: 100%; max-width: 800px; height: 160px; margin: 0 auto;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 24px; position: relative; overflow: hidden;
        }
        .viewport::after { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--primary); z-index: 10; }
        #strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; }
        .slot { min-width: 140px; display: flex; flex-direction: column; align-items: center; }
        .slot img { width: 80px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        /* KAZANMA EKRANI */
        #win-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        .win-card { background: rgba(255,255,255,0.05); padding: 50px; border-radius: 40px; border: 1px solid var(--primary); text-align: center; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<nav>
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="logo.png" width="45" onerror="this.src='https://minecraft.wiki/images/Anvil_JE3_BE2.png'">
        <div style="font-size: 26px; font-weight: 800;">AESIR<span style="color:var(--primary)">MC</span></div>
    </div>
</nav>

<div class="fixed-play-container">
    <button class="btn-play" onclick="window.location.href='https://aesirmc.com'">
        <img src="aa.png" class="custom-cursor-img">
        oyna.aesirmc.com
    </button>
</div>

<div id="auth-container">
    <img src="logo.png" width="80" style="margin-bottom: 20px;" onerror="this.style.display='none'">
    <h2>Giriş Yap</h2>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="btn-primary" onclick="connectAndGo()">DÜNYAYA KATIL</button>
</div>

<div id="game-container">
    <h1 id="welcome-txt" style="font-size: 36px; margin-bottom: 30px;"></h1>
    
    <div id="chest-zone">
        <img src="adsız.png" id="main-chest-img" class="main-chest" onclick="handleChestClick()" onerror="this.src='https://minecraft.wiki/images/Chest_JE2_BE2.png'">
        <p style="margin-top: 30px; color: var(--primary); font-weight: 600; letter-spacing: 2px;">SANDIĞI AÇMAK İÇİN DOKUN</p>
    </div>

    <div id="roulette-section">
        <div class="viewport"><div id="strip"></div></div>
        <button class="btn-primary" id="spin-btn" style="width: 240px; margin-top: 40px;" onclick="runRoulette()">KASAYI ÇEVİR</button>
    </div>
</div>

<div id="win-modal">
    <div class="win-card">
        <h3 style="color: var(--primary); text-transform: uppercase;">TEBRİKLER!</h3>
        <h1 id="win-name" style="font-size: 48px; margin: 10px 0;"></h1>
        <img id="win-img" src="" width="180">
        <div style="margin-top: 40px;"><button class="btn-primary" onclick="location.reload()">TEKRAR DENE</button></div>
    </div>
</div>

<script>
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co";
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const _db = supabase.createClient(S_URL, S_KEY);

    const rewards = [
        { name: "100AP", img: "100.png" }, { name: "500AP", img: "500.png" },
        { name: "1000AP", img: "1000.png" }, { name: "200AP", img: "200.png" }, { name: "2000AP", img: "2000.png" }
    ];

    async function connectAndGo() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Bilgileri gir!");

        const { error } = await _db.from('users').insert([{ username: u, password: p }]);
        
        if (error) {
            alert("Hata: " + error.message);
        } else {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('welcome-txt').innerText = "HOŞ GELDİN, " + u.toUpperCase();
            showToast(`Giriş başarılı!`);
        }
    }

    function handleChestClick() {
        const chest = document.getElementById('main-chest-img');
        chest.classList.add('chest-jump');
        
        setTimeout(() => {
            document.getElementById('chest-zone').style.display = 'none';
            document.getElementById('roulette-section').style.display = 'block';
            initRoulette();
        }, 500);
    }

    function initRoulette() {
        const strip = document.getElementById('strip');
        strip.innerHTML = '';
        // 80 tane rastgele ödül kutusu oluştur (akıcılık için)
        for(let i=0; i<80; i++) {
            const item = rewards[Math.floor(Math.random() * rewards.length)];
            strip.innerHTML += `<div class="slot"><img src="${item.img}"><span style="font-size: 11px; margin-top:5px; opacity:0.5;">${item.name}</span></div>`;
        }
    }

    function runRoulette() {
        const strip = document.getElementById('strip');
        const btn = document.getElementById('spin-btn');
        btn.disabled = true; btn.style.opacity = "0.3";
        
        const move = 6000 + Math.floor(Math.random() * 1500); // Rastgele duruş noktası
        strip.style.transition = "transform 6s cubic-bezier(0.15, 0, 0.15, 1)";
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            const final = rewards[Math.floor(Math.random() * rewards.length)];
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-name').innerText = final.name;
            document.getElementById('win-img').src = final.img;
        }, 6500);
    }

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast'; t.innerHTML = `✅ ${msg}`;
        container.appendChild(t);
        setTimeout(() => t.classList.add('show'), 100);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 4000);
    }
</script>
</body>
</html>
